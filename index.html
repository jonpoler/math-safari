  --r:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:contain;
}
#app{max-width:820px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.hidden{display:none !important;}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(254,248,238,.92);
  backdrop-filter:saturate(180%) blur(10px);
  display:flex;align-items:center;gap:10px;padding:12px 16px calc(12px);
  padding-top:max(12px,env(safe-area-inset-top));
  border-bottom:1px solid var(--line);
}
.stat{display:flex;align-items:center;gap:6px;font-weight:800;font-size:16px;}
.stat .ico{font-size:19px;}
.stat.streak{color:var(--orange-d);}
.stat.coins{color:var(--sun);filter:saturate(1.2);}
.stat.gems{color:var(--sky);}
.topbar .spacer{flex:1;}
.levelchip{display:flex;align-items:center;gap:8px;background:var(--green-l);color:var(--green-d);
  padding:6px 12px;border-radius:999px;font-weight:800;font-size:14px;}
.levelbar{width:60px;height:8px;border-radius:99px;background:#cdead9;overflow:hidden;}
.levelbar>i{display:block;height:100%;background:var(--green);border-radius:99px;}

/* ---------- Views ---------- */
.view{flex:1;padding:16px 16px 96px;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h1{font-size:26px;font-weight:900;margin:6px 4px 2px;letter-spacing:-.5px;}
.sub{color:var(--muted);margin:0 4px 16px;font-weight:600;}

/* ---------- Daily goal ring ---------- */
.goalcard{display:flex;align-items:center;gap:16px;background:var(--card);border-radius:var(--r);
  padding:16px;box-shadow:var(--shadow);margin-bottom:16px;}
.ring{width:74px;height:74px;flex:none;position:relative;}
.ring svg{transform:rotate(-90deg);}
.ring .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:15px;flex-direction:column;line-height:1;}
.ring .lbl small{font-size:9px;color:var(--muted);font-weight:700;margin-top:2px;}
.goalcard .txt b{font-size:17px;}
.goalcard .txt p{margin:3px 0 0;color:var(--muted);font-weight:600;font-size:13.5px;}

/* ---------- Zone map ---------- */
.zone{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:var(--r);
  padding:14px;box-shadow:var(--shadow);margin-bottom:13px;border:2px solid transparent;
  transition:transform .12s ease, box-shadow .12s;position:relative;overflow:hidden;}
.zone:active{transform:scale(.985);}
.zone.locked{opacity:.6;}
.zone .emoji{width:58px;height:58px;flex:none;border-radius:16px;display:flex;align-items:center;
  justify-content:center;font-size:32px;background:var(--green-l);}
.zone .zi{flex:1;min-width:0;}
.zone .zi h3{margin:0;font-size:17px;font-weight:850;display:flex;align-items:center;gap:8px;}
.zone .zi .tag{font-size:11px;font-weight:800;color:var(--muted);background:var(--bg);
  padding:2px 8px;border-radius:99px;border:1px solid var(--line);}
.zone .zi p{margin:4px 0 8px;color:var(--muted);font-size:13px;font-weight:600;}
.pbar{height:9px;border-radius:99px;background:#eee6d8;overflow:hidden;}
.pbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--sun));
  transition:width .5s cubic-bezier(.2,.8,.2,1);}
.zone .go{width:40px;height:40px;flex:none;border-radius:50%;background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;box-shadow:0 4px 0 var(--green-d);}
.zone.locked .go{background:#c9bfae;box-shadow:0 4px 0 #b3a893;}
.zone .done{position:absolute;top:10px;right:12px;font-size:15px;color:var(--sun);}
.hdr-badge{display:inline-flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);
  padding:6px 12px;border-radius:99px;font-weight:800;font-size:13px;box-shadow:var(--shadow);}

/* ---------- Buttons ---------- */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--green);color:#fff;font-weight:850;font-size:17px;padding:16px;border-radius:16px;
  box-shadow:0 5px 0 var(--green-d);transition:transform .08s, box-shadow .08s;}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-d);}
.btn.alt{background:#fff;color:var(--green-d);border:2px solid var(--line);box-shadow:0 5px 0 #eadfce;}
.btn.alt:active{box-shadow:0 2px 0 #eadfce;}
.btn.orange{background:var(--orange);box-shadow:0 5px 0 var(--orange-d);}
.btn.ghost{background:transparent;color:var(--muted);box-shadow:none;font-size:15px;}
.btn[disabled]{opacity:.45;pointer-events:none;}
.btn.small{width:auto;padding:11px 18px;font-size:15px;border-radius:13px;}

/* ---------- Practice ---------- */
.pracwrap{max-width:560px;margin:0 auto;display:flex;flex-direction:column;min-height:calc(100vh - 60px);}
.pracbar{display:flex;align-items:center;gap:12px;padding:6px 2px 14px;}
.close{font-size:24px;color:var(--muted);font-weight:800;width:32px;}
.pprog{flex:1;height:14px;border-radius:99px;background:#eadfce;overflow:hidden;}
.pprog>i{display:block;height:100%;background:var(--green);border-radius:99px;transition:width .3s;}
.hearts{font-size:15px;letter-spacing:1px;}
.qcard{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px;}
.qskill{font-size:12px;font-weight:800;color:var(--green-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.qtext{font-size:24px;font-weight:800;line-height:1.35;letter-spacing:-.3px;}
.qtext .frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;
  margin:0 3px;line-height:1;}
.qtext .frac b{border-bottom:2.5px solid var(--ink);padding:0 4px 2px;}
.qtext .frac span{padding-top:2px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.choice{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:18px 12px;
  font-size:20px;font-weight:800;box-shadow:0 4px 0 #eadfce;transition:transform .08s,box-shadow .08s;
  min-height:62px;display:flex;align-items:center;justify-content:center;}
.choice:active{transform:translateY(2px);box-shadow:0 2px 0 #eadfce;}
.choice.sel{border-color:var(--green);background:var(--green-l);color:var(--green-d);}
.choice.right{border-color:var(--green);background:var(--green-l);color:var(--green-d);box-shadow:0 4px 0 #bfe6cf;}
.choice.wrong{border-color:var(--red);background:var(--red-l);color:var(--red);box-shadow:0 4px 0 #f6c9ce;}
.choice.dim{opacity:.5;}
.gridin{display:flex;flex-direction:column;gap:10px;align-items:center;margin-bottom:12px;}
.gridin input{font-family:inherit;font-size:30px;font-weight:900;text-align:center;width:180px;padding:14px;
  border:3px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);outline:none;}
.gridin input:focus{border-color:var(--green);}
.hintbox{background:#fff7e8;border:1.5px solid #ffe3ad;border-radius:14px;padding:12px 14px;margin-bottom:12px;
  font-weight:650;font-size:14.5px;color:#8a6a1f;animation:fade .2s;}
.hintbox b{color:#6b5210;}

/* feedback bar */
.fbbar{position:sticky;bottom:0;margin:0 -16px;padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  animation:slideup .25s cubic-bezier(.2,.9,.2,1);}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.fbbar.good{background:var(--green-l);}
.fbbar.bad{background:var(--red-l);}
.fbbar .row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.fbbar .ic{font-size:30px;}
.fbbar .msg b{font-size:17px;display:block;}
.fbbar .msg small{font-weight:650;opacity:.85;}
.fbbar.good .msg{color:var(--green-d);}
.fbbar.bad .msg{color:var(--red);}
.steps{font-size:13.5px;font-weight:650;color:var(--ink);opacity:.85;margin:2px 0 12px;line-height:1.5;}
.steps div{padding:2px 0;}

/* ---------- Collection ---------- */
.grid-animals{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:12px;}
.animal{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px 6px;text-align:center;}
.animal .em{font-size:40px;filter:grayscale(1);opacity:.25;}
.animal.have .em{filter:none;opacity:1;}
.animal .nm{font-size:12px;font-weight:800;margin-top:6px;}
.animal.have .nm{color:var(--ink);}
.animal .nm.lock{color:#c3b8a5;}

/* ---------- Profile / parent ---------- */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.statbox{background:var(--bg);border-radius:14px;padding:14px;text-align:center;}
.statbox b{font-size:26px;font-weight:900;display:block;}
.statbox small{color:var(--muted);font-weight:700;font-size:12px;}
.masterrow{display:flex;align-items:center;gap:10px;margin:10px 0;}
.masterrow .em{font-size:22px;width:28px;text-align:center;}
.masterrow .nm{flex:1;font-weight:750;font-size:13.5px;}
.masterrow .pbar{flex:1.4;}
.masterrow .pct{font-weight:800;font-size:12.5px;width:36px;text-align:right;color:var(--muted);}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,.94);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;
  padding:8px 0 max(8px,env(safe-area-inset-bottom));max-width:820px;margin:0 auto;}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
  font-weight:800;font-size:11px;padding:4px;}
.nav button .ni{font-size:23px;}
.nav button.on{color:var(--green);}

/* ---------- Onboarding / modal ---------- */
.center{max-width:460px;margin:0 auto;text-align:center;padding:30px 20px 40px;}
.center .mascot{margin:10px auto 6px;}
.center h2{font-size:27px;font-weight:900;margin:8px 0 6px;letter-spacing:-.5px;}
.center p{color:var(--muted);font-weight:650;font-size:15.5px;line-height:1.5;margin:0 0 22px;}
.namein{font-family:inherit;font-size:20px;font-weight:800;text-align:center;width:100%;padding:15px;
  border:3px solid var(--line);border-radius:16px;outline:none;margin-bottom:16px;}
.namein:focus{border-color:var(--green);}
.starterrow{display:flex;justify-content:center;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
.starter{width:84px;height:84px;border-radius:20px;background:var(--card);box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-size:44px;border:3px solid transparent;transition:transform .1s;}
.starter:active{transform:scale(.94);}
.starter.sel{border-color:var(--green);background:var(--green-l);}

/* overlay (level up / unlock) */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(36,59,54,.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s;}
.pop{background:var(--card);border-radius:26px;padding:30px 24px;text-align:center;max-width:360px;width:100%;
  box-shadow:var(--shadow-lg);animation:pop .35s cubic-bezier(.2,1.3,.4,1);}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:none;opacity:1}}
.pop .big{font-size:64px;margin-bottom:6px;animation:bounce 1s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pop h2{font-size:24px;font-weight:900;margin:6px 0;}
.pop p{color:var(--muted);font-weight:650;margin:0 0 20px;}
.confetti{position:fixed;top:-10px;font-size:18px;z-index:59;pointer-events:none;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg);opacity:.9}}

.sectlabel{font-weight:850;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:6px 4px 10px;}
.link{color:var(--green-d);font-weight:800;text-decoration:none;}
.tinylink{color:var(--muted);font-weight:700;font-size:12.5px;text-decoration:underline;}
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* =========================================================================
   MATH SAFARI  —  a 7th-grade + SHSAT-foundation math adventure for Elsa
   Single file. Saves progress on the device (localStorage).
   ========================================================================= */

/* ---------------- helpers ---------------- */
const $ = (s,el=document)=>el.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!==undefined)e.innerHTML=h; return e;};
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const gcd=(a,b)=>{a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;};
const nz=n=>{let v;do{v=rand(-n,n);}while(v===0);return v;};   // non-zero
const neg=n=>"("+n+")";                                        // wrap negatives in parens for display
const sgn=n=> (n<0? "("+n+")" : ""+n);
function simp(n,d){ if(d<0){n=-n;d=-d;} const g=gcd(n,d); n/=g; d/=g; return [n,d]; }
function fracStr(n,d){ if(d===1)return ""+n; return n+"/"+d; }
// pretty fraction html
function fhtml(n,d){ if(d===1) return ""+n; const s=n<0?"-":""; n=Math.abs(n);
  return s+'<span class="frac"><b>'+n+'</b><span>'+d+'</span></span>'; }

// build 4 multiple-choice options from correct + distractor pool
function mc(correct, pool){
  const set=[String(correct)];
  pool=shuffle(pool.map(String));
  for(const p of pool){ if(set.length>=4)break; if(!set.includes(p))set.push(p); }
  let guard=0; const numeric=!isNaN(Number(correct));
  while(set.length<4 && guard++<50){ if(!numeric)break; const j=String(Number(correct)+rand(-6,6)); if(!set.includes(j))set.push(j); }
  return {choices:shuffle(set), answer:String(correct)};
}

/* ---------------- animals to collect ---------------- */
const ANIMALS=[
  {em:"🦊",nm:"Fern the Fox"},{em:"🦦",nm:"Ollie Otter"},{em:"🐧",nm:"Pip Penguin"},
  {em:"🦉",nm:"Ada Owl"},{em:"🐢",nm:"Sheldon"},{em:"🦩",nm:"Rosa Flamingo"},
  {em:"🦎",nm:"Zippy Lizard"},{em:"🐎",nm:"Comet"},{em:"🐫",nm:"Dune Camel"},
  {em:"🦆",nm:"Waddle Duck"},{em:"🦅",nm:"Apex Eagle"},{em:"🐼",nm:"Bao Panda"},
  {em:"🦋",nm:"Iris Flutter"},{em:"🦔",nm:"Quill"},{em:"🐨",nm:"Kip Koala"},
  {em:"🦫",nm:"Buck Beaver"},{em:"🦭",nm:"Splash Seal"},{em:"🐙",nm:"Inky"},
  {em:"🦚",nm:"Nova Peacock"},{em:"🦥",nm:"Mellow Sloth"},{em:"🐝",nm:"Buzz"},
  {em:"🦌",nm:"Willow Deer"},{em:"🦜",nm:"Mango Parrot"},{em:"🐬",nm:"Echo Dolphin"},
];
const starters=["🦊","🦦","🐼","🦉"];

/* ---------------- GENERATORS ----------------
   Each returns {skill,type:'mc'|'grid',qhtml,answer,hint,steps[]}          */
const G={};
function tiers(d,vals){var i=Math.max(1,Math.min(vals.length,Math.round(d)));return vals[i-1];}

/* Integers ---------------------------------------------------------------*/
G.int_add=(d)=>{const R=tiers(d,[9,14,20,30,45,60]);let a=nz(R),b=nz(R);const ans=a+b;
  return {type:"mc",qhtml:sgn(a)+" + "+sgn(b)+" = ?",answer:ans,
    ...mc(ans,[a-b,-a+b,-(a+b),ans+ (a>0?1:-1), ans-2]),
    hint:"Same signs → add and keep the sign. Different signs → subtract and take the sign of the bigger number.",
    steps:["Signs "+(Math.sign(a)===Math.sign(b)?"match, so add the values and keep the sign.":"differ, so subtract the smaller size from the larger and use that sign."),
           sgn(a)+" + "+sgn(b)+" = "+ans]};};
G.int_sub=(d)=>{const R=tiers(d,[9,14,20,30,45,60]);let a=nz(R),b=nz(R);const ans=a-b;
  return {type:"mc",qhtml:sgn(a)+" − "+sgn(b)+" = ?",answer:ans,
    ...mc(ans,[a+b,b-a,-(a-b),ans+2,ans-1]),
    hint:"Subtracting is adding the opposite: a − b = a + (−b).",
    steps:["Add the opposite: "+sgn(a)+" + "+sgn(-b),
           "= "+ans]};};
G.int_mul=(d)=>{const R=tiers(d,[9,10,12,14,16,20]);let a=nz(R),b=nz(R);const ans=a*b;
  return {type:"mc",qhtml:sgn(a)+" × "+sgn(b)+" = ?",answer:ans,
    ...mc(ans,[-ans,a+b,ans+a,ans-b]),
    hint:"Two same signs → positive. Two different signs → negative.",
    steps:[(Math.sign(a)===Math.sign(b)?"Same signs → positive.":"Different signs → negative."),
           Math.abs(a)+" × "+Math.abs(b)+" = "+Math.abs(ans)+", so the answer is "+ans+"."]};};
G.int_div=(d)=>{const R=tiers(d,[8,10,12,14,16,20]);let b=nz(R),q=nz(R);const a=b*q;const ans=q;
  return {type:"mc",qhtml:sgn(a)+" ÷ "+sgn(b)+" = ?",answer:ans,
    ...mc(ans,[-ans,ans+1,ans-1,ans+2]),
    hint:"Same signs → positive, different signs → negative — just like multiplying.",
    steps:[(Math.sign(a)===Math.sign(b)?"Same signs → positive.":"Different signs → negative."),
           Math.abs(a)+" ÷ "+Math.abs(b)+" = "+Math.abs(ans)]};};
G.int_abs=(d)=>{const v=nz(tiers(d,[12,18,25,35,50,70]));const ans=Math.abs(v);
  return {type:"mc",qhtml:"| "+v+" | = ?",answer:ans,...mc(ans,[-ans,v,ans+1,ans-1]),
    hint:"Absolute value = distance from 0. It is never negative.",
    steps:["The distance of "+v+" from 0 is "+ans+"."]};};
G.int_order=(d)=>{const R=tiers(d,[9,10,12,15,18,22]);const a=nz(R),b=nz(R),c=nz(R);
  const ans=a+b*c;
  return {type:"mc",qhtml:sgn(a)+" + "+sgn(b)+" × "+sgn(c)+" = ?",answer:ans,
    ...mc(ans,[(a+b)*c,ans+ b, a-b*c, ans-1]),
    hint:"Order of operations: multiply before you add.",
    steps:["Multiply first: "+sgn(b)+" × "+sgn(c)+" = "+(b*c),
           "Then add: "+sgn(a)+" + "+sgn(b*c)+" = "+ans]};};

/* Decimals ---------------------------------------------------------------*/
function dec(d){return rand(1,tiers(d,[80,150,300,600,999,1800]))/100;}
G.dec_add=(d)=>{const a=dec(d),b=dec(d);const ans=Math.round((a+b)*100)/100;
  return {type:"grid",qhtml:a+" + "+b+" = ?",answer:ans,
    hint:"Line up the decimal points, then add. Bring the point straight down.",
    steps:["Stack "+a+" and "+b+" so the decimal points line up.","Add: "+ans]};};
G.dec_sub=(d)=>{let a=dec(d),b=dec(d);if(b>a)[a,b]=[b,a];const ans=Math.round((a-b)*100)/100;
  return {type:"grid",qhtml:a+" − "+b+" = ?",answer:ans,
    hint:"Line up the decimal points and subtract, borrowing as usual.",
    steps:["Line up decimals.","Subtract: "+ans]};};
G.dec_mul=(d)=>{const a=(rand(11,tiers(d,[29,49,79,120,180,260]))/10),b=(rand(2,9)/(Math.round(d)<=1?1:10));
  const ans=Math.round((a*b)*100)/100;
  return {type:"grid",qhtml:a+" × "+b+" = ?",answer:ans,
    hint:"Multiply ignoring the points, then count total decimal places and place the point.",
    steps:["Multiply as whole numbers.","Count decimal places in both factors, then place the point → "+ans]};};
G.dec_round=(d)=>{const v=rand(100,tiers(d,[999,1500,2500,5000,9999,20000]))/100;const ans=Math.round(v*10)/10;
  return {type:"mc",qhtml:"Round "+v+" to the nearest tenth.",answer:ans,
    ...mc(ans,[Math.floor(v*10)/10,Math.ceil(v),Math.round(v),Math.round(v*10)/10+0.1]),
    hint:"Look at the hundredths digit: 5 or more rounds up, 4 or less rounds down.",
    steps:["Tenths place is the target; check the next digit.","Rounded: "+ans]};};

/* Fractions --------------------------------------------------------------*/
function fpair(max){const d=rand(2,max);let n=rand(1,d-1);return [n,d];}
G.fr_add=(d)=>{const D=tiers(d,[[2,3,4],[2,3,4,5,6],[3,4,5,6,8],[3,4,5,6,8,10],[4,5,6,8,9,10,12],[5,6,7,8,9,10,12,15]]);let d1=pick(D),d2=pick(D);
  let n1=rand(1,d1-1),n2=rand(1,d2-1);
  let num=n1*d2+n2*d1, den=d1*d2;[num,den]=simp(num,den);
  return {type:"mc",qhtml:fhtml(n1,d1)+" + "+fhtml(n2,d2)+" = ?",answer:fracStr(num,den),
    ...mcFrac(num,den),
    hint:"Find a common denominator, rename both fractions, then add the numerators.",
    steps:["Common denominator of "+d1+" and "+d2+" → "+(d1*d2)+" (or smaller).",
           "Add numerators, then simplify → "+fracStr(num,den)]};};
G.fr_sub=(d)=>{const D=tiers(d,[[2,3,4],[2,3,4,6],[3,4,5,6],[3,4,5,6,8],[4,5,6,8,10,12],[5,6,7,8,9,12]]);let d1=pick(D),d2=pick(D);
  let n1=rand(1,d1-1),n2=rand(1,d2-1);let num=n1*d2-n2*d1,den=d1*d2;
  if(num<0){num=-num;} [num,den]=simp(num,den);
  if(n1*d2 < n2*d1){[n1,d1,n2,d2]=[n2,d2,n1,d1];}
  num=Math.abs(n1*d2-n2*d1);den=d1*d2;[num,den]=simp(num,den);
  return {type:"mc",qhtml:fhtml(n1,d1)+" − "+fhtml(n2,d2)+" = ?",answer:fracStr(num,den),
    ...mcFrac(num,den),
    hint:"Common denominator first, then subtract the numerators, then simplify.",
    steps:["Rename with a common denominator.","Subtract numerators and simplify → "+fracStr(num,den)]};};
G.fr_mul=(d)=>{let[n1,d1]=fpair(tiers(d,[6,7,8,9,11,13])),[n2,d2]=fpair(tiers(d,[6,7,8,9,11,13]));
  let num=n1*n2,den=d1*d2;[num,den]=simp(num,den);
  return {type:"mc",qhtml:fhtml(n1,d1)+" × "+fhtml(n2,d2)+" = ?",answer:fracStr(num,den),
    ...mcFrac(num,den),
    hint:"Multiply straight across: tops × tops and bottoms × bottoms. Then simplify.",
    steps:["Numerators: "+n1+"×"+n2+" = "+(n1*n2),"Denominators: "+d1+"×"+d2+" = "+(d1*d2),"Simplify → "+fracStr(num,den)]};};
G.fr_div=(d)=>{let[n1,d1]=fpair(tiers(d,[6,7,8,9,10,12])),[n2,d2]=fpair(tiers(d,[6,7,8,9,10,12]));
  let num=n1*d2,den=d1*n2;[num,den]=simp(num,den);
  return {type:"mc",qhtml:fhtml(n1,d1)+" ÷ "+fhtml(n2,d2)+" = ?",answer:fracStr(num,den),
    ...mcFrac(num,den),
    hint:"Keep, Change, Flip: keep the first, change ÷ to ×, flip the second fraction.",
    steps:["Flip the divisor: ÷ "+fracStr(n2,d2)+" → × "+fracStr(d2,n2),
           "Multiply across and simplify → "+fracStr(num,den)]};};
G.fr_simp=(d)=>{const g=rand(2,tiers(d,[3,4,5,6,8,9]));const[n,dn]=fpair(tiers(d,[6,7,8,9,10,12]));const N=n*g,D=dn*g;const[sn,sd]=simp(N,D);
  return {type:"mc",qhtml:"Write "+fhtml(N,D)+" in simplest form.",answer:fracStr(sn,sd),
    ...mcFrac(sn,sd),
    hint:"Divide the top and bottom by their greatest common factor.",
    steps:["GCF of "+N+" and "+D+" is "+gcd(N,D)+".","Divide both by it → "+fracStr(sn,sd)]};};
G.fr_pct=(d)=>{const map=[[1,2,50],[1,4,25],[3,4,75],[1,5,20],[2,5,40],[3,5,60],[1,10,10],[1,4,25],[7,10,70],[1,20,5]];
  const m=pick(map);const ans=m[2];
  return {type:"mc",qhtml:"Write "+fhtml(m[0],m[1])+" as a percent.",answer:ans+"%",
    ...mc(ans+"%",[ (ans+5)+"%",(ans-5)+"%",(m[0]*m[1])+"%",(ans+10)+"%"]),
    hint:"Percent means 'out of 100'. Make an equal fraction with 100 on the bottom, or divide and ×100.",
    steps:[m[0]+" ÷ "+m[1]+" = "+(m[0]/m[1]),"× 100 → "+ans+"%"]};};
function mcFrac(num,den){const a=fracStr(num,den);const pool=[];
  pool.push(fracStr(num+1,den));pool.push(fracStr(num,den+1));pool.push(fracStr(den,num||1));
  pool.push(fracStr(num*2,den));pool.push(fracStr(Math.max(1,num-1),den));
  return mc(a,pool);}

/* Equations --------------------------------------------------------------*/
G.eq_one=(d)=>{const t=pick(["+","−","×"]);const x=nz(tiers(d,[9,12,15,18,22,30]));let b,q,disp,ans=x;
  if(t==="+"){b=rand(1,tiers(d,[12,20,30,40,55,80]));disp="x + "+b+" = "+(x+b);}
  else if(t==="−"){b=rand(1,tiers(d,[12,20,30,40,55,80]));disp="x − "+b+" = "+(x-b);}
  else{b=rand(2,tiers(d,[9,9,10,11,12,12]));disp=b+"x = "+(b*x);}
  return {type:"grid",qhtml:"Solve for x:  "+disp,answer:ans,
    hint:"Undo the operation on x by doing the opposite to both sides.",
    steps:[t==="×"?("Divide both sides by "+b):("Do the opposite of "+t+" "+b+" to both sides"),"x = "+ans]};};
G.eq_two=(d)=>{const a=rand(2,tiers(d,[5,6,7,8,9,11]));const x=nz(tiers(d,[8,10,12,14,17,22]));const b=rand(1,tiers(d,[10,15,20,28,38,55]));const sign=pick([1,-1]);
  const c=a*x + sign*b;
  const disp=a+"x "+(sign>0?"+ "+b:"− "+b)+" = "+c;
  return {type:"grid",qhtml:"Solve for x:  "+disp,answer:x,
    hint:"Two steps: first undo the + or −, then undo the multiply by dividing.",
    steps:["Move the "+(sign>0?"+"+b:"−"+b)+": "+a+"x = "+(a*x),
           "Divide both sides by "+a+": x = "+x]};};
G.eq_ineq=(d)=>{const a=rand(2,tiers(d,[5,5,6,7,8,9]));const x=rand(2,tiers(d,[9,10,12,14,17,22]));const b=rand(1,tiers(d,[12,15,20,25,30,40]));const c=a*x+b;
  return {type:"mc",qhtml:"Solve:  "+a+"x + "+b+" ≤ "+c,answer:"x ≤ "+x,
    ...mc("x ≤ "+x,["x ≥ "+x,"x ≤ "+(x+1),"x ≤ "+(x-1),"x < "+x]),
    hint:"Solve it like an equation. The inequality sign only flips if you ×/÷ by a negative.",
    steps:["Subtract "+b+": "+a+"x ≤ "+(a*x),"Divide by "+a+": x ≤ "+x]};};

G.pc_of=(d)=>{const p=pick(Math.round(d)<=2?[10,20,25,50]:[5,15,30,40,60,75]);const whole=rand(2,tiers(d,[12,20,30,40,60,90]))*(p===25||p===75?4:p===20||p===40||p===60?5:10);
  const ans=whole*p/100;
  return {type:"grid",qhtml:"What is "+p+"% of "+whole+"?",answer:ans,
    hint:"Turn the percent into a decimal (÷100) and multiply, or use a known fraction like 25% = ¼.",
    steps:[p+"% = "+(p/100),"× "+whole+" = "+ans]};};
G.pc_what=(d)=>{const whole=pick(tiers(d,[[20,40,60,80],[20,40,60,80,100],[20,40,60,80,100,200],[40,60,80,100,200],[60,80,100,200,400],[80,100,200,400,500]]));const p=pick([10,20,25,50]);const part=whole*p/100;
  return {type:"grid",qhtml:part+" is what percent of "+whole+"?",answer:p+"",
    hint:"Percent = part ÷ whole, then × 100.",
    steps:[part+" ÷ "+whole+" = "+(part/whole),"× 100 = "+p+"%"],answerLabel:"%"};};
G.pc_change=(d)=>{const old=pick(tiers(d,[[20,40,60,80],[20,40,60,80,100],[20,40,60,80,100,200],[40,60,80,100,200],[60,80,100,200,400],[80,100,200,400]]));const p=pick([10,20,25,50]);const up=pick([1,-1]);
  const nw=old+up*old*p/100;const ans=p;
  return {type:"grid",qhtml:"A price "+(up>0?"rose":"fell")+" from $"+old+" to $"+nw+". What is the percent "+(up>0?"increase":"decrease")+"?",answer:ans,
    hint:"Percent change = (amount of change ÷ original) × 100.",
    steps:["Change = "+Math.abs(nw-old),"÷ "+old+" = "+(Math.abs(nw-old)/old),"× 100 = "+ans+"%"],answerLabel:"%"};};
G.pc_tax=(d)=>{const price=pick(tiers(d,[[20,25,40,50],[20,25,40,50,60],[20,25,40,50,60,80],[20,25,40,50,60,80,100],[25,40,50,60,80,100],[40,50,60,80,100,120]]));const p=pick(Math.round(d)<=2?[5,10,15]:[5,10,15,20,25]);const kind=pick([["tax","total cost"],["tip","total you pay"],["discount","sale price"]]);
  let ans; if(kind[0]==="discount")ans=price - price*p/100; else ans=price + price*p/100;

    steps:[p+"% of "+price+" = "+(price*p/100),(kind[0]==="discount"?"Subtract from ":"Add to ")+price+" → $"+ans]};};
G.pc_interest=(d)=>{const P=pick(tiers(d,[[100,200],[100,200,300],[100,200,300,400,500],[100,200,300,500,1000],[200,300,500,1000],[300,500,1000,2000]]));const r=pick([2,3,4,5,10]);const t=rand(2,tiers(d,[3,3,4,4,5,6]));

const ALLSKILLS=[]; ZONES.forEach(z=>z.skills.forEach(s=>ALLSKILLS.push({...s,zone:z.id})));

/* ---------------- STATE ---------------- */
const SKEY="mathsafari_v2";
let S=null;
function freshState(){
  return {name:"",guide:"🦊",xp:0,streak:0,lastDay:null,daysActive:[],
    dailyGoal:30,todayXP:0,todayDate:null,todayMin:0,
    mastery:{},         // skillId -> 0..100
    diff:{}, level:{}, seen:{},   // per-skill difficulty(1..6) + last-seen day
    attempts:0,correct:0,
    animals:[],         // indexes owned
    onboarded:false,placed:false};
}
function load(){ try{S=JSON.parse(localStorage.getItem(SKEY))||null;}catch(e){S=null;}
  if(!S){S=freshState();}
  // fill defaults for new keys
  const f=freshState(); for(const k in f){ if(S[k]===undefined)S[k]=f[k]; }
  ALLSKILLS.forEach(s=>{ if(S.mastery[s.id]===undefined)S.mastery[s.id]=0; if(S.diff[s.id]===undefined)S.diff[s.id]=1; if(S.seen[s.id]===undefined)S.seen[s.id]=null; if(S.level[s.id]===undefined)S.level[s.id]=({1:1,2:3,3:5}[Math.round(S.diff[s.id])]||1); });
  rolloverDay();
}
function save(){ try{localStorage.setItem(SKEY,JSON.stringify(S));}catch(e){} }
function today(){ return new Date().toISOString().slice(0,10); }
function rolloverDay(){
  const t=today();
  if(S.todayDate!==t){ S.todayDate=t; S.todayXP=0; S.todayMin=0; }
}
function level(){ return Math.floor(S.xp/100)+1; }
function levelProg(){ return S.xp%100; }
function zoneMastery(z){ const sk=ZONES[ZOFF[z]].skills; let sum=0; sk.forEach(s=>sum+=S.mastery[s.id]); return Math.round(sum/sk.length); }
function zoneUnlocked(i){ if(i===0)return true; return zoneMastery(ZONES[i-1].id)>=50; }
function totalMastery(){ let s=0; ALLSKILLS.forEach(k=>s+=S.mastery[k.id]); return Math.round(s/ALLSKILLS.length); }

/* ---------------- SESSION ENGINE ---------------- */
let sess=null;
function sessionPlan(n){var a=[];for(var i=0;i<n;i++){a.push(i<2?'warm':(i>=n-1?'cool':'work'));}return a;}
function baseLevel(sid){return Math.max(S.level[sid]||1,(S.mastery[sid]>=50?2.5:1));}
function effLevel(sid,phase){var b=baseLevel(sid);if(sess&&sess.coach)return Math.max(1,b-2);if(phase==='warm')return Math.max(1,b-1.5);if(phase==='cool')return Math.max(1,b-0.8);return b;}
function startSession(skillIds,label){
  sess={skills:skillIds,label:label,i:0,total:8,correctCount:0,xpEarned:0,
        startT:Date.now(),cur:null,answered:false,selected:null,hintShown:false,newAnimals:[],
        wrongStreak:0,coach:false,leveledUp:[],lastXp:0,justLeveled:false,phaseFor:sessionPlan(8)};
  nextQ();
  renderPractice();
}
function startDailyMix(){
  var t=today(),frontier=null;
  for(var i=0;i<ZONES.length;i++){ if(zoneUnlocked(i)&&zoneMastery(ZONES[i].id)<100){frontier=ZONES[i];break;} }
  if(!frontier)frontier=ZONES[0];
  var set=frontier.skills.map(function(s){return s.id;});
  var review=[];
  ALLSKILLS.forEach(function(s){ if(zoneUnlocked(ZOFF[s.zone])&&s.zone!==frontier.id&&(S.mastery[s.id]||0)>0&&(S.mastery[s.id]||0)<85&&S.seen[s.id]!==t)review.push(s.id); });
  review=shuffle(review).slice(0,2);
  startSession(review.concat(set),"Daily Warm-Up");
}
function nextQ(){
  var phase=(sess.phaseFor&&sess.phaseFor[sess.i])||'work';
  var sid;
  if(sess.skills.length>1 && Math.random()<0.6){
    sid=sess.skills.slice().sort(function(a,b){return (S.mastery[a]||0)-(S.mastery[b]||0);})[0];
  } else { sid=pick(sess.skills); }
  const skill=ALLSKILLS.find(s=>s.id===sid);
  let q;
  if(skill.gen){ q=skill.gen(effLevel(sid,phase)); }
  else { q=pick(BANKS[skill.bank]); q=JSON.parse(JSON.stringify(q)); }
  q.skillId=sid; q.skillName=skill.name; q.phase=phase;
  sess.cur=q; sess.answered=false; sess.selected=null;
  sess.hintShown = sess.coach ? true : false;
  S.seen[sid]=today();
}
function renderPractice(){
  app.innerHTML="";
  const wrap=el("div","view"); wrap.style.paddingBottom="0";
  const pw=el("div","pracwrap");
  // top bar
  const bar=el("div","pracbar");
  const close=el("button","close","✕"); close.onclick=()=>{ if(confirm("Leave this session? Your stars so far are saved."))endSession(true); };
  bar.appendChild(close);
  const pr=el("div","pprog"); pr.innerHTML='<i style="width:'+(sess.i/sess.total*100)+'%"></i>';
  bar.appendChild(pr);
  bar.appendChild(el("div","stat coins",'⭐️'+sess.xpEarned));
  pw.appendChild(bar);
  // question card
  const q=sess.cur;
  const card=el("div","qcard");
  card.innerHTML='<div class="qskill">'+q.skillName+'</div><div class="qtext">'+q.qhtml+'</div>';
  pw.appendChild(card);
  // hint
  if(sess.hintShown){ pw.appendChild(el("div","hintbox",'<b>💡 Hint:</b> '+q.hint)); }
  // answer area
  if(q.type==="mc"){
    const grid=el("div","choices");
    q.choices.forEach(ch=>{
      const b=el("button","choice",ch);
      if(sess.answered){
        if(ch===String(q.answer)) b.classList.add("right");
        else if(ch===sess.selected) b.classList.add("wrong");
        else b.classList.add("dim");
      } else if(sess.selected===ch){ b.classList.add("sel"); }
      if(!sess.answered) b.onclick=()=>{ sess.selected=ch; checkAnswer(ch); };
      grid.appendChild(b);
    });
    pw.appendChild(grid);
  } else {
    const gi=el("div","gridin");
    const inp=el("input"); inp.type="text"; inp.inputMode="decimal"; inp.placeholder="?";
    inp.setAttribute("autocomplete","off"); inp.setAttribute("autocorrect","off");
    if(sess.answered){ inp.value=sess.selected; inp.disabled=true;
      inp.style.borderColor = isCorrect(sess.selected,q)?"var(--green)":"var(--red)"; }
    gi.appendChild(inp);
    if(q.answerLabel) gi.appendChild(el("div","",'<span style="color:var(--muted);font-weight:700;font-size:13px">answer in '+q.answerLabel.trim()+'</span>'));
    pw.appendChild(gi);
    if(!sess.answered){
      const ck=el("button","btn","Check");
      ck.onclick=()=>{ const v=inp.value.trim(); if(v==="")return; sess.selected=v; checkAnswer(v); };
      pw.appendChild(ck);
      setTimeout(()=>inp.focus(),150);
    }
  }
  // hint button (before answering)
  if(!sess.answered && !sess.hintShown){
    const hb=el("button","btn ghost","💡 Show a hint");
    hb.onclick=()=>{ sess.hintShown=true; renderPractice(); };
    pw.appendChild(hb);
  }
  // feedback bar (after answering)
  if(sess.answered){ pw.appendChild(feedbackBar(q)); }
  wrap.appendChild(pw);
  app.appendChild(wrap);
}
function isCorrect(val,q){
  if(q.type==="mc") return String(val)===String(q.answer);
  const a=parseFloat(String(q.answer)); const v=parseFloat(String(val).replace(/[^0-9.\-]/g,""));
  if(isNaN(v))return false;
  return Math.abs(a-v)<0.001;
}
function checkAnswer(val){
  const q=sess.cur; const ok=isCorrect(val,q);
  sess.answered=true;
  S.attempts++; if(ok)S.correct++;
  const sid=q.skillId; var before=Math.floor(S.level[sid]||1); sess.justLeveled=false;
  if(ok){
    let gain=sess.hintShown?6:10;
    S.mastery[sid]=Math.min(100,(S.mastery[sid]||0)+gain);
    sess.correctCount++;
    let lv=Math.round(baseLevel(sid));
    let xp=lv*2+(sess.hintShown?0:3); sess.lastXp=xp; sess.xpEarned+=xp;
    S.level[sid]=Math.min(6,(S.level[sid]||1)+(sess.hintShown?0.08:0.22));
    if(Math.floor(S.level[sid])>before){ sess.justLeveled=true; if(sess.leveledUp.indexOf(q.skillName)<0) sess.leveledUp.push(q.skillName); }
    sess.wrongStreak=0; sess.coach=false;
  } else {
    S.mastery[sid]=Math.max(0,(S.mastery[sid]||0)-4);
    S.level[sid]=Math.max(1,(S.level[sid]||1)-0.5);
    sess.lastXp=0; sess.wrongStreak=(sess.wrongStreak||0)+1;
    if(sess.wrongStreak>=3){ sess.coach=true; S.level[sid]=Math.max(1,(S.level[sid]||1)-0.6); }
  }
  save();
  renderPractice();
}
function feedbackBar(q){
  const ok=isCorrect(sess.selected,q);
  const fb=el("div","fbbar "+(ok?"good":"bad"));
  var title = ok ? pick(["Nice work!","You got it!","Boom! ⭐️","Correct!","Sharp!"])
                 : (sess.coach ? "Let's slow down 💛" : pick(["Not quite","Almost!","Let's learn this one"]));
  var sub = ok ? ('+'+(sess.lastXp||0)+' stars'+(sess.justLeveled?' · ⬆️ Level up!':''))
              : (sess.coach ? "No worries — the next one comes with a walkthrough." : ("Correct answer: "+q.answer+(q.answerLabel||'')));
  let html='<div class="row"><div class="ic">'+(ok?"🎉":(sess.coach?"🧭":"💪"))+'</div><div class="msg"><b>'+title+'</b><small>'+sub+'</small></div></div>';
  if(!ok && q.steps){ html+='<div class="steps">'+q.steps.map(s=>'<div>→ '+s+'</div>').join('')+'</div>'; }
  fb.innerHTML=html;
  const cont=el("button","btn"+(ok?"":" orange"), sess.i+1>=sess.total?"Finish ✓":"Continue →");
  cont.onclick=()=>{ sess.i++; if(sess.i>=sess.total){ endSession(false); } else { nextQ(); renderPractice(); } };
  fb.appendChild(cont);
  return fb;
}
function endSession(early){
  // award XP to profile
  S.xp+=sess.xpEarned;
  rolloverDay();
  const before=S.todayXP;
  S.todayXP+=sess.xpEarned;
  // streak + active days
  const t=today();
  if(!S.daysActive.includes(t)) S.daysActive.push(t);
  if(S.todayXP>=S.dailyGoal && before<S.dailyGoal){
    // goal met today -> update streak
    if(S.lastDay){
      const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
      if(S.lastDay===y) S.streak++;
      else if(S.lastDay!==t) S.streak=1;
    } else S.streak=1;
    S.lastDay=t;
  }
  // unlock animals based on total mastered skills
  reconcileAnimals();
  save();
  renderSummary(early);
}
function reconcileAnimals(){
  // number of animals owned = number of skills at >=100 + zones completed milestones, capped
  let earned=0;
  ALLSKILLS.forEach(s=>{ if(S.mastery[s.id]>=100) earned++; });
  // also award 1 per 60 xp as a steady collectible drip
  earned+=Math.floor(S.xp/60);
  earned=Math.min(ANIMALS.length,earned);
  const newly=[];
  for(let i=0;i<earned;i++){ if(!S.animals.includes(i)){ S.animals.push(i); newly.push(i); } }
  sess.newAnimals=newly;
}
function renderSummary(early){
  app.innerHTML="";
  const c=el("div","center");

  c.innerHTML=
    '<div class="mascot" style="font-size:70px">'+(acc>=80?"🌟":acc>=50?"👍":"🙂")+'</div>'+
    '<h2>'+(early?"Session saved":"Session complete!")+'</h2>'+
    '<p>You earned <b style="color:var(--sun)">'+sess.xpEarned+' ⭐️</b> and got '+sess.correctCount+' right.</p>';
  const box=el("div","card");
  box.innerHTML='<div class="statgrid">'+
    '<div class="statbox"><b>'+sess.xpEarned+'</b><small>⭐️ stars</small></div>'+
    '<div class="statbox"><b>'+acc+'%</b><small>accuracy</small></div>'+
    '<div class="statbox"><b>'+S.streak+'</b><small>🔥 streak</small></div>'+

  if(sess.newAnimals&&sess.newAnimals.length){

      n.map(a=>'<div style="text-align:center"><div style="font-size:46px">'+a.em+'</div><div style="font-weight:800;font-size:12px">'+a.nm+'</div></div>').join('')+'</div>';
    c.appendChild(ac);

/* ---------------- PLACEMENT CHECK ---------------- */
let P=null;
function zn(z){ return ZONES[ZOFF[z]]; }
function buildPlacementQs(){
  const specs=[["integers",()=>G.int_add(2)],["fractions",()=>G.fr_add(2)],["decimals",()=>G.dec_mul(2)],
    ["expressions",()=>G.ex_dist(2)],["equations",()=>G.eq_two(2)],["proportions",()=>G.rp_prop(2)],
    ["percents",()=>G.pc_of(2)],["geometry",()=>pick(BANKS.geo)],["circles",()=>pick(BANKS.circ)],["data",()=>pick(BANKS.data)]];
  return specs.map(function(sp){ var q=JSON.parse(JSON.stringify(sp[1]())); q.zone=sp[0]; q.zoneName=zn(sp[0]).name; return q; });
}
function startPlacement(){ P={qs:buildPlacementQs(),i:0,results:{},sel:null,answered:false}; renderPlacement(); try{window.scrollTo(0,0);}catch(e){} }
function renderPlacement(){
  app.innerHTML="";
  var wrap=el("div","view"); wrap.style.paddingBottom="0"; var pw=el("div","pracwrap");
  var bar=el("div","pracbar");
  var cl=el("button","close","✕"); cl.onclick=function(){ if(confirm("Stop the placement check? You can retake it anytime from the Me tab.")) go("map"); };
  bar.appendChild(cl);
  var pr=el("div","pprog"); pr.innerHTML='<i style="width:'+(P.i/P.qs.length*100)+'%"></i>'; bar.appendChild(pr);
  bar.appendChild(el("div","stat coins",(P.i+1)+"/"+P.qs.length));
  pw.appendChild(bar);
  var q=P.qs[P.i];
  var card=el("div","qcard");
  card.innerHTML='<div class="qskill">Placement · '+q.zoneName+'</div><div class="qtext">'+q.qhtml+'</div>';
  pw.appendChild(card);
  if(q.type==="mc"){
    var grid=el("div","choices");
    q.choices.forEach(function(ch){ var b=el("button","choice",ch);
      if(P.answered){ if(ch===String(q.answer))b.classList.add("right"); else if(ch===P.sel)b.classList.add("wrong"); else b.classList.add("dim"); }
      if(!P.answered) b.onclick=function(){ P.sel=ch; placementAnswer(ch); };
      grid.appendChild(b); });
    pw.appendChild(grid);
  } else {
    var gi=el("div","gridin"); var inp=el("input"); inp.type="text"; inp.inputMode="decimal"; inp.placeholder="?";
    inp.setAttribute("autocomplete","off"); inp.setAttribute("autocorrect","off");
    if(P.answered){ inp.value=P.sel; inp.disabled=true; inp.style.borderColor=isCorrect(P.sel,q)?"var(--green)":"var(--red)"; }
    gi.appendChild(inp);
    if(q.answerLabel) gi.appendChild(el("div","",'<span style="color:var(--muted);font-weight:700;font-size:13px">answer in '+q.answerLabel.trim()+'</span>'));
    pw.appendChild(gi);
    if(!P.answered){ var ck=el("button","btn","Check"); ck.onclick=function(){ var v=inp.value.trim(); if(v==="")return; P.sel=v; placementAnswer(v); }; pw.appendChild(ck);
      setTimeout(function(){try{inp.focus();}catch(e){}},150); }
  }
  if(P.answered){
    var ok=isCorrect(P.sel,q);
    var fb=el("div","fbbar "+(ok?"good":"bad"));
    fb.innerHTML='<div class="row"><div class="ic">'+(ok?"✅":"📘")+'</div><div class="msg"><b>'+(ok?"You know this one!":"We’ll work on this together")+'</b><small>'+(ok?"Nice.":"Correct answer: "+q.answer+(q.answerLabel||""))+'</small></div></div>';
    var cont=el("button","btn"+(ok?"":" orange"), (P.i+1>=P.qs.length)?"See my results →":"Next →");
    cont.onclick=function(){ P.i++; if(P.i>=P.qs.length) finishPlacement(); else { P.answered=false; P.sel=null; renderPlacement(); } };
    fb.appendChild(cont); pw.appendChild(fb);
  }
  wrap.appendChild(pw); app.appendChild(wrap);
}
function placementAnswer(val){ var q=P.qs[P.i]; P.results[q.zone]=isCorrect(val,q); P.answered=true; renderPlacement(); }
function finishPlacement(){
  var strong=[],gaps=[];
  P.qs.forEach(function(q){ var ok=!!P.results[q.zone];
    zn(q.zone).skills.forEach(function(s){ S.mastery[s.id]=ok?55:10; });
    (ok?strong:gaps).push(q.zone); });
  S.placed=true; S.placementSnapshot={date:today(),strong:strong.slice(),gaps:gaps.slice()}; save();
  var order=P.qs.map(function(q){return q.zone;});
  var rec=order.find(function(z){return gaps.indexOf(z)>=0;}); if(!rec) rec=order[order.length-1];
  renderPlacementResults(strong,gaps,rec);
}
function renderPlacementResults(strong,gaps,rec){
  app.innerHTML="";
  var c=el("div","center");
  c.innerHTML='<div class="mascot" style="font-size:64px">🧭</div><h2>Placement complete!</h2>'+

    '<div style="color:var(--muted);font-weight:650;font-size:14px">I’ve unlocked every zone up to here, so you can review earlier ones or jump right in.</div>';

  b2.onclick=function(){ route="map"; startSession(zn(rec).skills.map(function(s){return s.id;}), zn(rec).name); }; c.appendChild(b2);
  app.appendChild(c);
}
